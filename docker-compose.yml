services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexly
      POSTGRES_PASSWORD: nexly_secret
      POSTGRES_DB: nexly
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://nexly:nexly_secret@postgres:5432/nexly
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      SMS_PROVIDER: console
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - media:/app/media
    command: >
      sh -c "
        sleep 3 &&
        python -m app.create_tables &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  pgdata:
  media:
