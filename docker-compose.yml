services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexly
      POSTGRES_PASSWORD: nexly_secret
      POSTGRES_DB: nexly
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexly"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  libretranslate:
    image: libretranslate/libretranslate:latest
    ports:
      - "5050:5000"
    environment:
      LT_LOAD_ONLY: "en,fa,ar,es,fr,de,it,pt,ru,zh,ja,ko,tr,hi"
      LT_DISABLE_WEB_UI: "false"
    volumes:
      - lt_data:/home/libretranslate/.local

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://nexly:nexly_secret@postgres:5432/nexly
      REDIS_URL: redis://redis:6379/0
      # H-1/L-10 FIX: If not set, config.py auto-generates a random key
      # Set a persistent key in .env for production: SECRET_KEY=your-secure-random-key
      # SECRET_KEY: ${SECRET_KEY}  # Intentionally omitted — auto-generated if missing
      SMS_PROVIDER: console
      LIBRETRANSLATE_URL: http://libretranslate:5000
      TRANSLATION_ENABLED: "true"
      ALLOWED_ORIGINS: "*"
      ADMIN_PHONES: ${ADMIN_PHONES:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - media:/app/media
    command: >
      sh -c "
        python -m app.create_tables &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  pgdata:
  media:
  lt_data:
